name: EventIQ CI

on:
  push:
    branches:
      [
        main,
        dev,
        release/v1.0,
        feature-auth,
        feature-events,
        feature-resources,
        feature-notifications,
      ]
  pull_request:
    branches: [main, dev, release/v1.0]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      notification: ${{ steps.filter.outputs.notification }}
      frontend: ${{ steps.filter.outputs.frontend }}
      resource: ${{ steps.filter.outputs.resource }}
      event: ${{ steps.filter.outputs.event }}
      compose: ${{ steps.filter.outputs.compose }}
      backend_any: ${{ steps.filter.outputs.backend_any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'auth-service/**'
            notification:
              - 'notification-service/**'
            frontend:
              - 'frontend/**'
            resource:
              - 'resource-service/**'
            event:
              - 'event-service/**'
            compose:
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            backend_any:
              - 'auth-service/**'
              - 'notification-service/**'
              - 'resource-service/**'
              - 'event-service/**'
      - name: Debug detected changes
        run: |
          echo "auth=${{ steps.filter.outputs.auth }}"
          echo "notification=${{ steps.filter.outputs.notification }}"
          echo "frontend=${{ steps.filter.outputs.frontend }}"
          echo "resource=${{ steps.filter.outputs.resource }}"
          echo "event=${{ steps.filter.outputs.event }}"
          echo "compose=${{ steps.filter.outputs.compose }}"
          echo "backend_any=${{ steps.filter.outputs.backend_any }}"

  build-auth:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-notification:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build

  build-resource:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.resource == 'true'
    defaults:
      run:
        working-directory: resource-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  build-event:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.event == 'true'
    defaults:
      run:
        working-directory: event-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: mvn -q -DskipTests package

  docker-smoke:
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.compose == 'true' || needs.detect-changes.outputs.backend_any == 'true'
    needs:
      [
        detect-changes,
        build-auth,
        build-notification,
        build-frontend,
        build-resource,
        build-event,
      ]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files for compose validation
        run: |
          cp auth-service/.env.sample auth-service/.env
          cp event-service/.env.sample event-service/.env
          cp resource-service/.env.sample resource-service/.env
          cp notification-service/.env.sample notification-service/.env
          cp api-gateway/.env.sample api-gateway/.env
          cp frontend/.env.sample frontend/.env
      - run: docker compose -f docker-compose.yml config
