name: EventIQ CI

on:
  push:
    branches: [ main, develop, feature-auth, feature-events, feature-resources, feature-notifications ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-auth:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-notification:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  build-resource:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resource-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  build-event:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: mvn -q -DskipTests package

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [build-auth, build-notification, build-frontend, build-resource, build-event]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config
